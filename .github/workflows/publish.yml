name: publish

on:
  push:
    tags: [ v* ]
  workflow_dispatch:

jobs:
  build-publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup dotNET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.x
          9.x
          10.x
    - name: Restore
      run: |
        dotnet restore DH.MySql/DH.MySql.csproj
        dotnet restore DH.MySql.EntityFramework/DH.MySql.EntityFramework.csproj
        dotnet restore DH.MySql.EntityFrameworkCore/DH.MySql.EntityFrameworkCore.csproj
    - name: Build
      env:
        LANG: en_US.UTF-8
        LC_ALL: en_US.UTF-8
      run: |
        dotnet pack --no-restore --version-suffix $(date "+%Y.%m%d") -c Release -o out DH.MySql/DH.MySql.csproj
        dotnet pack --no-restore --version-suffix $(date "+%Y.%m%d") -c Release -o out DH.MySql.EntityFramework/DH.MySql.EntityFramework.csproj
        dotnet pack --no-restore --version-suffix $(date "+%Y.%m%d") -c Release -o out DH.MySql.EntityFrameworkCore/DH.MySql.EntityFrameworkCore.csproj
    - name: Publish
      run: |
        dotnet nuget push ./out/*.nupkg --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.nugetKey }}
        dotnet nuget push ./out/*.nupkg --skip-duplicate --source https://nuget.chuangchu.net/v3/index.json --api-key ${{ secrets.mynugetKey }}
